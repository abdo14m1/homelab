apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure-controllers
    - name: apps
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./monitoring/digitalocean"
  prune: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
