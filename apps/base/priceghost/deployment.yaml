apiVersion: v1
kind: Namespace
metadata:
  name: priceghost
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: priceghost-backend
  name: priceghost-backend
  namespace: priceghost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: priceghost-backend
  template:
    metadata:
      labels:
        app: priceghost-backend
    spec:
      initContainers:
        - name: disable-public-registration
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: priceghost-db-rw
            - name: PGDATABASE
              value: priceghost
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: priceghost-database-user
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: priceghost-database-user
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready -h "$PGHOST" -d "$PGDATABASE" -U "$PGUSER"; do
                sleep 2
              done
              psql <<'SQL'
              CREATE TABLE IF NOT EXISTS system_settings (
                key VARCHAR(255) PRIMARY KEY,
                value TEXT NOT NULL,
                updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              INSERT INTO system_settings (key, value)
              VALUES ('registration_enabled', 'false')
              ON CONFLICT (key) DO UPDATE
              SET value = EXCLUDED.value,
                  updated_at = CURRENT_TIMESTAMP;
              SQL
      containers:
        - image: ghcr.io/clucraft/priceghost-backend:33b9445
          name: priceghost-backend
          envFrom:
            - configMapRef:
                name: priceghost-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: priceghost-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: priceghost-secrets
                  key: jwt-secret
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: priceghost-frontend
  name: priceghost-frontend
  namespace: priceghost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: priceghost-frontend
  template:
    metadata:
      labels:
        app: priceghost-frontend
    spec:
      containers:
        - image: ghcr.io/clucraft/priceghost-frontend:2549118
          name: priceghost-frontend
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
