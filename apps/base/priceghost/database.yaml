apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: priceghost-db
  namespace: priceghost
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8-minimal-bookworm
  instances: 1
  bootstrap:
    initdb:
      database: priceghost
      owner: priceghost
      secret:
        name: priceghost-database-user
  storage:
    size: 2Gi
    storageClass: local-ssd
  managed:
    services:
      disabledDefaultServices:
        - ro
        - r
