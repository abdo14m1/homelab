apiVersion: apps/v1
kind: Deployment
metadata:
  name: priceghost-backend
  namespace: priceghost
spec:
  template:
    spec:
      initContainers:
        - name: disable-public-registration
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: priceghost-db-rw
            - name: PGDATABASE
              value: priceghost
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: priceghost-database-user
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: priceghost-database-user
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready -h "$PGHOST" -d "$PGDATABASE" -U "$PGUSER"; do
                sleep 2
              done
              psql <<'SQL'
              CREATE TABLE IF NOT EXISTS system_settings (
                key VARCHAR(255) PRIMARY KEY,
                value TEXT NOT NULL,
                updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              INSERT INTO system_settings (key, value)
              VALUES ('registration_enabled', 'true')
              ON CONFLICT (key) DO UPDATE
              SET value = EXCLUDED.value,
                  updated_at = CURRENT_TIMESTAMP;
              SQL
