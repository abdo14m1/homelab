apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: priceghost
data:
  config.yaml: |
    tunnel: 1f9a4c58-b90b-4572-bb91-83504ae022bd
    credentials-file: /etc/cloudflared/creds/credentials.json
    ingress:
      - hostname: price.farag.tech
        service: http://priceghost.priceghost.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-connector
  namespace: priceghost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          volumeMounts:
            - name: config-volume
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds-volume
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: cloudflared-config
        - name: creds-volume
          secret:
            secretName: tunnel-credentials
