apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-stack
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.*
      interval: 12h
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: observability
  valuesFrom:
    - kind: ConfigMap
      name: vicotria-values
      valuesKey: values.yaml
