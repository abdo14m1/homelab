apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  httpRoute:
    spec:
      parentRefs:
        - name: production-gateway
          namespace: kube-system
      hostnames:
        - grafana.farag.tech
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: grafana-service
              port: 3000